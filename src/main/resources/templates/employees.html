<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Attendance Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #1f2937;
            color: white;
            padding: 20px;
            position: fixed;
            width: 230px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .main-content {
            margin-left: 240px;
            padding: 30px;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .navbar-custom {
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-custom px-4">

        <span class="navbar-brand fw-bold">
            <i class="bi bi-clock-history"></i>
            Attendance System
        </span>

    </nav>


    <!-- SIDEBAR -->

    <div class="sidebar">

        <h5 class="mb-4">Menu</h5>

        <a href="/">
            <i class="bi bi-upload"></i>
            Upload Attendance
        </a>

        <a href="/employees">
            <i class="bi bi-people"></i>
            Employees
        </a>

    </div>


    <!-- MAIN CONTENT -->

    <div class="main-content">

        <div class="card p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4 class="mb-0">
                    <i class="bi bi-people"></i>
                    Employee List
                </h4>

                <div class="d-flex gap-2">

                    <form method="get" th:action="@{/employees}">

                        <div class="input-group">

                            <input type="text" name="keyword" class="form-control" placeholder="Search Name or NIK"
                                th:value="${keyword}">

                            <button class="btn btn-primary">
                                <i class="bi bi-search"></i>
                            </button>

                        </div>

                    </form>

                    <a href="/" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i>
                        Upload Data
                    </a>

                </div>

            </div>


            <!-- TABLE -->

            <table class="table table-bordered table-hover">

                <thead class="table-dark text-center">

                    <tr>

                        <th>No</th>
                        <th>NIK</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Date</th>
                        <th>Check Time</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr th:each="log, stat : ${logs}" class="text-center">

                        <td th:text="${stat.index + 1 + (currentPage * 10)}"></td>

                        <td th:text="${log.user.badgeNumber}"></td>

                        <td th:text="${log.user.name}"></td>

                        <td th:text="${log.user.department.deptName}"></td>

                        <td th:text="${#temporals.format(log.checkTime,'yyyy-MM-dd')}"></td>

                        <td th:text="${#temporals.format(log.checkTime,'HH:mm')}"></td>

                        <td>

                            <a th:href="@{/employees/{id}/logs(id=${log.user.userId})}"
                                class="btn btn-sm btn-outline-primary">

                                View Logs

                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>


            <!-- PAGINATION -->

            <div class="d-flex justify-content-between align-items-center">

                <nav>

                    <ul class="pagination">

                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">

                            <a class="page-link" th:href="@{/employees(page=${currentPage-1},keyword=${keyword})}">
                                «
                            </a>

                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(start,end)}"
                            th:classappend="${i == currentPage} ? 'active'">

                            <a class="page-link" th:href="@{/employees(page=${i},keyword=${keyword})}" th:text="${i+1}">
                            </a>

                        </li>

                        <li class="page-item" th:classappend="${currentPage+1 >= totalPages} ? 'disabled'">

                            <a class="page-link" th:href="@{/employees(page=${currentPage+1},keyword=${keyword})}">
                                »
                            </a>

                        </li>

                    </ul>

                </nav>


                <!-- DOWNLOAD CARD -->

                <div class="bg-success text-white p-3 rounded" style="width:320px">

                    <h6 class="mb-3">
                        <i class="bi bi-download"></i>
                        Download Attendance
                    </h6>

                    <form action="/api/export-txt" method="get" class="row g-2">

                        <div class="col-6">

                            <input type="date" name="start" class="form-control" required>

                        </div>

                        <div class="col-6">

                            <input type="date" name="end" class="form-control" required>

                        </div>

                        <div class="col-12 text-end">

                            <button class="btn btn-warning btn-sm">

                                Download TXT

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
