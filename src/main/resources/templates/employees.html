<!DOCTYPE html>
<html>
<head>

<title>Employees</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h3>Employee List</h3>

<table class="table table-bordered">

<thead>

<tr>
<th>No</th>
<th>NIK</th>
<th>Name</th>
<th>Department</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="emp : ${employees}">

<td th:text="${emp.userId}"></td>

<td th:text="${emp.badgeNumber}"></td>

<td th:text="${emp.name}"></td>

<td th:text="${emp.department.deptName}"></td>

<td th:text="${emp.isActive} ? 'Active' : 'Inactive'"></td>
<td>
<a th:href="@{/employees/{id}/logs(id=${emp.userId})}"
   class="btn btn-sm btn-primary">

View Logs

</a>
</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
