<!DOCTYPE html>
<html>

<head>
    <title>Upload MDB</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-5">

    <h2>Upload Attendance MDB</h2>

    <form id="uploadForm">

        <input type="file" name="file" class="form-control w-50" accept=".mdb" required>

        <br>

        <button type="submit" class="btn btn-primary" id="uploadBtn">
            Upload
        </button>

    </form>


    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content text-center p-4">

                <div class="spinner-border text-primary mb-3"></div>

                <h5>Mohon tunggu...</h5>
                <p>Data attendance sedang diproses</p>

            </div>

        </div>

    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


    <script>

        document.getElementById("uploadForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                const formData = new FormData(this);
                const uploadBtn = document.getElementById("uploadBtn");

                uploadBtn.disabled = true;

                const modalElement = document.getElementById("loadingModal");
                const loadingModal = new bootstrap.Modal(modalElement);

                loadingModal.show();

                try {

                    const response = await fetch("/api/upload", {
                        method: "POST",
                        body: formData
                    });

                    const result = await response.json();

                    loadingModal.hide();

                    Swal.fire({
                        icon: "success",
                        title: "Upload Berhasil",
                        text: "Total data: " + result.totalRecords,
                        confirmButtonText: "OK"
                    }).then(() => {
                        window.location.href = "/employees";
                    });

                } catch (err) {

                    loadingModal.hide();

                    Swal.fire({
                        icon: "error",
                        title: "Upload Gagal",
                        text: "Terjadi kesalahan saat upload file"
                    });

                    uploadBtn.disabled = false;

                }

            });

    </script>

</body>

</html>
