<!DOCTYPE html>
<html>
<head>

<title>Attendance Logs</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h3>Attendance Logs</h3>

<table class="table table-bordered">

<thead>

<tr>
<th>NIK</th>
<th>Name</th>
<th>Date</th>
<th>Check Time</th>
<th>Type</th>
</tr>

</thead>

<tbody>

<tr th:each="log : ${logs}">

<td th:text="${log.user.badgeNumber}"></td>

<td th:text="${log.user.name}"></td>

<td th:text="${#temporals.format(log.checkTime, 'yyyy-MM-dd')}"></td>

<td th:text="${#temporals.format(log.checkTime, 'HH:mm')}"></td>

<td th:text="${log.checkType}"></td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
